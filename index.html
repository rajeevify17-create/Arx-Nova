<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ARX System</title>
<style>
/* === Body & Fonts === */
body {
  font-family: 'Arial', sans-serif;
  background: #0f0f15;
  color: #fff;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background 0.5s;
}

/* === Header === */
header {
  text-align: center;
  margin-top: 30px;
}
header h1 {
  font-size: 3rem;
  color: #00fff0;
  text-shadow: 0 0 10px #00fff0, 0 0 20px #00fff0;
  margin-bottom: 5px;
}
header p {
  color: #888;
  font-size: 1.2rem;
}

/* === Input Section === */
#inputSection {
  margin-top: 20px;
}
input, button {
  padding: 12px 20px;
  font-size: 1rem;
  border: none;
  border-radius: 6px;
  outline: none;
}
input {
  width: 250px;
  margin-right: 10px;
}
button {
  background: #00fff0;
  color: #111;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  background: #00bfae;
}

/* === Timetable Section === */
#timetable {
  margin-top: 30px;
  width: 80%;
  max-width: 600px;
  border-collapse: collapse;
}
#timetable th, #timetable td {
  padding: 12px;
  border: 1px solid #222;
  text-align: center;
  transition: background 0.3s;
}
#timetable th {
  background: #111;
  color: #00fff0;
  font-size: 1.1rem;
}
#timetable td {
  background: #1a1a28;
  cursor: pointer;
}
#timetable td:hover {
  background: #00fff0;
  color: #111;
}

/* === Habit List === */
#habitList {
  margin-top: 30px;
  list-style: none;
  padding: 0;
  width: 80%;
  max-width: 400px;
}
#habitList li {
  background: #111;
  margin: 10px 0;
  padding: 12px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  opacity: 0;
  transform: translateY(-10px);
  animation: fadeIn 0.5s forwards;
}
#habitList li button {
  background: #ff0080;
  color: #fff;
  border-radius: 6px;
  padding: 6px 10px;
  cursor: pointer;
  border: none;
}
#habitList li button:hover {
  background: #ff0050;
}

@keyframes fadeIn {
  to {opacity:1; transform:translateY(0);}
}

/* === Streak Display === */
#streak {
  margin-top: 20px;
  font-size: 1.3rem;
  color: #00fff0;
}
</style>
</head>
<body>

<header>
  <h1>⚡ ARX System</h1>
  <p>Personal Discipline & Timetable Tracker</p>
</header>

<div id="inputSection">
  <input id="habitInput" placeholder="Enter a habit">
  <button onclick="addHabit()">Add Habit</button>
</div>

<table id="timetable">
  <tr>
    <th>Time Slot</th>
    <th>Habit</th>
  </tr>
  <tr><td>Morning (6-9am)</td><td id="slot1">—</td></tr>
  <tr><td>Afternoon (12-3pm)</td><td id="slot2">—</td></tr>
  <tr><td>Evening (6-9pm)</td><td id="slot3">—</td></tr>
</table>

<ul id="habitList"></ul>

<div id="streak">Current Streak: 0</div>

<script>
let streak = 0;

function addHabit() {
  const input = document.getElementById("habitInput");
  const text = input.value.trim();
  if(!text) return;

  // Add to habit list
  const li = document.createElement("li");
  li.textContent = text;

  const btn = document.createElement("button");
  btn.textContent = "✔";
  btn.onclick = function() {
    li.style.textDecoration = "line-through";
    streak++;
    document.getElementById("streak").textContent = "Current Streak: " + streak;
  }

  li.appendChild(btn);
  document.getElementById("habitList").appendChild(li);

  // Assign habit to first empty slot in timetable
  for(let i=1; i<=3; i++){
    const slot = document.getElementById("slot"+i);
    if(slot.textContent === "—"){
      slot.textContent = text;
      break;
    }
  }

  input.value="";
}
</script>

</body>
</html>
