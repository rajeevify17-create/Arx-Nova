<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ARX System 2.0</title>
<style>
/* === Body & Fonts === */
body {
  font-family: 'Arial', sans-serif;
  background: #0d0d15;
  color: #fff;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: background 0.5s;
}

/* === Header === */
header {
  text-align: center;
  margin-top: 30px;
}
header h1 {
  font-size: 3rem;
  color: #00fff0;
  text-shadow: 0 0 10px #00fff0, 0 0 20px #00fff0;
  margin-bottom: 5px;
}
header p {
  color: #888;
  font-size: 1.2rem;
}

/* === Input Section === */
#inputSection {
  margin-top: 20px;
}
input, button {
  padding: 12px 20px;
  font-size: 1rem;
  border: none;
  border-radius: 6px;
  outline: none;
}
input {
  width: 250px;
  margin-right: 10px;
  background: #1a1a28;
  color: #fff;
}
button {
  background: #00fff0;
  color: #111;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  background: #00bfae;
}

/* === Timetable === */
#timetable {
  margin-top: 30px;
  width: 90%;
  max-width: 700px;
  border-collapse: collapse;
}
#timetable th, #timetable td {
  padding: 12px;
  border: 1px solid #222;
  text-align: center;
  transition: background 0.3s, transform 0.3s;
}
#timetable th {
  background: #111;
  color: #00fff0;
  font-size: 1.1rem;
}
#timetable td {
  background: #1a1a28;
  cursor: pointer;
  min-width: 120px;
}
#timetable td:hover {
  background: #00fff0;
  color: #111;
  transform: scale(1.05);
}

/* === Habit List === */
#habitList {
  margin-top: 30px;
  list-style: none;
  padding: 0;
  width: 90%;
  max-width: 500px;
}
#habitList li {
  background: #111;
  margin: 10px 0;
  padding: 12px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  opacity: 0;
  transform: translateY(-10px);
  animation: fadeIn 0.5s forwards;
}
#habitList li button {
  background: #ff0080;
  color: #fff;
  border-radius: 6px;
  padding: 6px 10px;
  cursor: pointer;
  border: none;
  margin-left: 10px;
  transition: 0.3s;
}
#habitList li button:hover {
  background: #ff0050;
}

@keyframes fadeIn {
  to {opacity:1; transform:translateY(0);}
}

/* === Streak Display === */
#streak {
  margin-top: 20px;
  font-size: 1.3rem;
  color: #00fff0;
}

/* === Animations === */
.completed {
  text-decoration: line-through;
  color: #888;
  transition: all 0.3s;
}
</style>
</head>
<body>

<header>
  <h1>⚡ ARX System 2.0</h1>
  <p>Advanced Personal Discipline & Timetable Tracker</p>
</header>

<div id="inputSection">
  <input id="habitInput" placeholder="Enter a habit">
  <button onclick="addHabit()">Add Habit</button>
</div>

<table id="timetable">
  <tr>
    <th>Time Slot</th>
    <th>Habit</th>
    <th>Action</th>
  </tr>
  <tr><td>Morning (6-9am)</td><td id="slot1">—</td><td><button onclick="markDone(1)">✔</button></td></tr>
  <tr><td>Afternoon (12-3pm)</td><td id="slot2">—</td><td><button onclick="markDone(2)">✔</button></td></tr>
  <tr><td>Evening (6-9pm)</td><td id="slot3">—</td><td><button onclick="markDone(3)">✔</button></td></tr>
</table>

<ul id="habitList"></ul>

<div id="streak">Current Streak: 0</div>

<script>
// ===== Persistent Data =====
let habits = JSON.parse(localStorage.getItem("habits")) || [];
let streak = parseInt(localStorage.getItem("streak")) || 0;
let timetable = JSON.parse(localStorage.getItem("timetable")) || ["—","—","—"];

document.getElementById("streak").textContent = "Current Streak: " + streak;

// ===== Render Habits =====
function renderHabits() {
  const list = document.getElementById("habitList");
  list.innerHTML = "";
  habits.forEach((habit, i) => {
    const li = document.createElement("li");
    li.textContent = habit.name;
    if(habit.done) li.classList.add("completed");

    const btn = document.createElement("button");
    btn.textContent = habit.done ? "❌" : "✔";
    btn.onclick = () => toggleHabit(i);

    li.appendChild(btn);
    list.appendChild(li);
  });
}

// ===== Render Timetable =====
function renderTimetable() {
  for(let i=0;i<3;i++){
    document.getElementById("slot"+(i+1)).textContent = timetable[i] || "—";
  }
}

// ===== Toggle Habit Completion =====
function toggleHabit(i){
  habits[i].done = !habits[i].done;
  if(habits[i].done) streak++;
  else streak--;
  if(streak<0) streak=0;

  localStorage.setItem("habits", JSON.stringify(habits));
  localStorage.setItem("streak", streak);
  renderHabits();
  document.getElementById("streak").textContent = "Current Streak: " + streak;
}

// ===== Mark Timetable Slot Done =====
function markDone(slot){
  if(timetable[slot-1]!=="—"){
    streak++;
    document.getElementById("streak").textContent = "Current Streak: " + streak;
    localStorage.setItem("streak", streak);
    timetable[slot-1] += " ✔";
    localStorage.setItem("timetable", JSON.stringify(timetable));
    renderTimetable();
  }
}

// ===== Add New Habit =====
function addHabit(){
  const input = document.getElementById("habitInput");
  const text = input.value.trim();
  if(!text) return;

  const habitObj = {name:text, done:false};
  habits.push(habitObj);
  localStorage.setItem("habits", JSON.stringify(habits));

  // Assign to first empty timetable slot
  for(let i=0;i<3;i++){
    if(timetable[i]==="—"){
      timetable[i]=text;
      localStorage.setItem("timetable", JSON.stringify(timetable));
      break;
    }
  }

  input.value="";
  renderHabits();
  renderTimetable();
}

// ===== Initial Render =====
renderHabits();
renderTimetable();
</script>

</body>
</html>
